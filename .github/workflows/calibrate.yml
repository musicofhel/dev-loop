name: Calibrate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run daemon tests
        run: cd daemon && cargo test --quiet
      - name: Build dl binary
        run: cd daemon && cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: dl-binary
          path: daemon/target/release/dl
          retention-days: 1

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest tests/ -q

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build dl binary
        run: cd daemon && cargo build --release
      - name: Install dependencies
        run: uv sync
      - name: Install dl
        run: mkdir -p ~/.local/bin && cp daemon/target/release/dl ~/.local/bin/dl && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Run conformance
        run: uv run python scripts/conformance/run_conformance.py tests/conformance/pre_tool_use.yaml tests/conformance/post_tool_use.yaml

  tier2:
    name: Tier 2 Planted-Defect Suite
    runs-on: ubuntu-latest
    needs: [rust-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/download-artifact@v4
        with:
          name: dl-binary
          path: ~/.local/bin
      - name: Make dl executable
        run: chmod +x ~/.local/bin/dl && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz | tar xz -C ~/.local/bin gitleaks
      - name: Install semgrep
        run: pip install semgrep
      - name: Install dependencies
        run: uv sync
      - name: Run tier2 tests
        run: uv run pytest tests/tier2/ -q
