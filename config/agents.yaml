# Agent persona configuration
# Label → persona mapping used by orchestration layer
# See docs/layers/02-orchestration.md for details

personas:
  bug-fix:
    labels: [bug]
    claude_md_overlay: |
      Focus on minimal fix. Read the failing test first.
      Do not refactor surrounding code.
    cost_ceiling_default: 1.00
    retry_max: 2
    model: sonnet
    max_turns_default: 10
    max_context_pct: 75

  feature:
    labels: [feature]
    claude_md_overlay: |
      Implement the feature as described in the issue.
      Write tests for new code. Follow existing patterns.
    cost_ceiling_default: 5.00
    retry_max: 1
    model: opus
    max_turns_default: 25
    max_context_pct: 75

  refactor:
    labels: [refactor]
    claude_md_overlay: |
      Preserve all existing behavior. Run tests before and after.
      Commit in small increments.
    cost_ceiling_default: 3.00
    retry_max: 1
    model: opus
    max_turns_default: 20
    max_context_pct: 75

  security-fix:
    labels: [security]
    claude_md_overlay: |
      Fix the security vulnerability without changing functionality.
      Reference the CWE/CVE in your commit message.
      Run security scan to verify the fix.
    cost_ceiling_default: 2.00
    retry_max: 3
    model: opus
    max_turns_default: 15
    max_context_pct: 75

  docs:
    labels: [docs]
    claude_md_overlay: |
      Update documentation only. Do not change code.
    cost_ceiling_default: 0.50
    retry_max: 1
    model: haiku
    max_turns_default: 10
    max_context_pct: 75

  chore:
    labels: [chore]
    claude_md_overlay: |
      Simple maintenance task. Minimize changes.
    cost_ceiling_default: 0.50
    retry_max: 1
    model: haiku
    max_turns_default: 5
    max_context_pct: 75

  performance:
    labels: [performance, perf]
    claude_md_overlay: |
      Optimize for measurable improvement. Benchmark before and after.
    cost_ceiling_default: 3.00
    retry_max: 1
    model: sonnet
    max_turns_default: 15
    max_context_pct: 75

  infrastructure:
    labels: [infrastructure, ci, ci-cd, devops]
    claude_md_overlay: |
      Changes restricted to CI/CD configs, scripts, and infrastructure.
      Do not modify application code.
    cost_ceiling_default: 1.00
    retry_max: 1
    model: sonnet
    max_turns_default: 10
    max_context_pct: 75

  test:
    labels: [test, testing]
    claude_md_overlay: |
      Focus on test creation and test infrastructure.
      Do not change application code unless fixing a test-blocking bug.
    cost_ceiling_default: 2.00
    retry_max: 1
    model: sonnet
    max_turns_default: 15
    max_context_pct: 75
