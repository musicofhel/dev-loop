# OpenObserve alert rules for dev-loop
# Import these via the OpenObserve API or web UI
# See: https://openobserve.ai/docs/user-guide/alerts/
#
# IMPORTANT — OpenObserve schema notes:
#
# 1. _timestamp is Int64 (epoch microseconds), NOT a native Timestamp.
#    Use:  _timestamp >= CAST(NOW() - INTERVAL '10 MINUTES' AS BIGINT) / 1000
#    NOT:  _timestamp >= NOW() - INTERVAL '10 MINUTES'
#
# 2. Span attributes are FLATTENED: dots become underscores, no bracket syntax.
#    OTel attribute  "gates.first_failure"  → column  gates_first_failure
#    OTel attribute  "gate.status"          → column  gate_status
#    NOT: attributes_string['gate.status']
#
# 3. Columns only exist after the first span with that attribute is ingested.
#    Alerts referencing missing columns will produce "field not found" errors
#    until real pipeline spans flow through.

alerts:
  - name: gate_failure_spike
    description: "3+ gate failures in 10 minutes — investigate"
    stream: default
    condition:
      sql: >
        SELECT COUNT(*) as failures
        FROM default
        WHERE service_name = 'dev-loop'
          AND operation_name = 'gates.run_all'
          AND gates_first_failure IS NOT NULL
          AND _timestamp >= CAST(NOW() - INTERVAL '10 MINUTES' AS BIGINT) / 1000
      threshold: 3
      operator: ">="
    frequency_minutes: 5
    severity: warning

  - name: agent_stuck
    description: "Agent heartbeat missing for >5 minutes — may be hung"
    stream: default
    condition:
      sql: >
        SELECT issue_id,
               MAX(_timestamp) as last_heartbeat
        FROM default
        WHERE service_name = 'dev-loop'
          AND operation_name = 'runtime.heartbeat'
          AND _timestamp >= CAST(NOW() - INTERVAL '30 MINUTES' AS BIGINT) / 1000
        GROUP BY issue_id
        HAVING MAX(_timestamp) < CAST(NOW() - INTERVAL '5 MINUTES' AS BIGINT) / 1000
      threshold: 1
      operator: ">="
    frequency_minutes: 2
    severity: critical

  - name: high_turn_usage
    description: "Agent used >20 turns in a single run — possible runaway"
    stream: default
    condition:
      sql: >
        SELECT trace_id,
               runtime_num_turns as turns
        FROM default
        WHERE service_name = 'dev-loop'
          AND operation_name = 'runtime.spawn_agent'
          AND runtime_num_turns > 20
          AND _timestamp >= CAST(NOW() - INTERVAL '1 HOUR' AS BIGINT) / 1000
      threshold: 1
      operator: ">="
    frequency_minutes: 10
    severity: warning

  - name: escalation_spike
    description: "3+ issues escalated to human in 1 hour — systemic problem"
    stream: default
    condition:
      sql: >
        SELECT COUNT(*) as escalations
        FROM default
        WHERE service_name = 'dev-loop'
          AND operation_name = 'feedback.escalate'
          AND _timestamp >= CAST(NOW() - INTERVAL '1 HOUR' AS BIGINT) / 1000
      threshold: 3
      operator: ">="
    frequency_minutes: 15
    severity: critical

  - name: security_finding
    description: "Security vulnerability detected by Gate 3"
    stream: default
    condition:
      sql: >
        SELECT COUNT(*) as findings
        FROM default
        WHERE service_name = 'dev-loop'
          AND operation_name = 'gates.gate_3_security'
          AND gate_status = 'fail'
          AND _timestamp >= CAST(NOW() - INTERVAL '1 HOUR' AS BIGINT) / 1000
      threshold: 1
      operator: ">="
    frequency_minutes: 5
    severity: critical

  - name: session_burn_rate
    description: "Session consumed >200k tokens — unusually high for a single run"
    stream: default
    condition:
      sql: >
        SELECT trace_id,
               session_context_tokens_consumed as tokens
        FROM default
        WHERE service_name = 'dev-loop'
          AND session_context_tokens_consumed > 200000
          AND _timestamp >= CAST(NOW() - INTERVAL '10 MINUTES' AS BIGINT) / 1000
      threshold: 1
      operator: ">="
    frequency_minutes: 5
    severity: warning

  - name: guardrail_trigger_rate_spike
    description: "Guardrail block+warn rate exceeds 3x the 7-day hourly baseline"
    stream: default
    condition:
      sql: >
        SELECT COUNT(*) as trigger_count
        FROM default
        WHERE service_name = 'dev-loop'
          AND (guardrail_action = 'block'
               OR guardrail_action = 'warn')
          AND _timestamp >= CAST(NOW() - INTERVAL '1 HOUR' AS BIGINT) / 1000
      threshold: 3
      operator: ">="
    frequency_minutes: 60
    severity: warning
