# Per-project capability scoping (TB-1: CLAUDE.md rules, not OpenFang)
# See docs/layers/03-runtime.md for details

prompt-bench:
  allowed_tools:
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - Bash  # scoped to test/lint commands only
  denied_paths:
    - .env
    - secrets/
    - "*.pem"
    - "*.key"
  bash_allowlist:
    - "npm test"
    - "npm run lint"
    - "npm run build"
    - "git status"
    - "git diff"
    - "git add"
    - "git commit"
