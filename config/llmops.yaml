# Layer 7: LLMOps — DSPy prompt optimization config
#
# Set enabled: true after running your first successful GEPA optimization.
# Provider: "anthropic" (direct API) or "openrouter" (OpenRouter proxy).
# Requires the corresponding API key env var to be set.

llmops:
  enabled: true
  provider: openrouter
  api_key_env: OPENROUTER_API_KEY

  langfuse:
    enabled: false
    url: http://localhost:3001
    public_key_env: LANGFUSE_PUBLIC_KEY
    secret_key_env: LANGFUSE_SECRET_KEY

  artifact_dir: ~/.local/share/dev-loop/llmops/artifacts
  training_dir: ~/.local/share/dev-loop/llmops/training

  programs:
    code_review:
      model: claude-opus-4-6
      max_bootstrapped_demos: 4
      max_labeled_demos: 8
      num_trials: 20
      metric_threshold: 0.7

    retry_prompt:
      model: claude-opus-4-6
      max_bootstrapped_demos: 3
      max_labeled_demos: 6
      num_trials: 15
      metric_threshold: 0.5

    persona_select:
      model: claude-opus-4-6
      max_bootstrapped_demos: 4
      max_labeled_demos: 10
      num_trials: 10
      metric_threshold: 0.6
