# Project-specific configuration for OOTestProject2
# Cascade test target — downstream of OOTestProject1

quality_gates:
  differential:
    enabled: true
  sanity:
    enabled: true
    commands: ["uv run pytest"]
  relevance:
    enabled: true
  secrets:
    enabled: true
  dangerous_ops:
    enabled: true
  security:
    enabled: true
    severity_threshold: medium
  review:
    enabled: true
    block_on: critical
  cost:
    enabled: true
    ceiling_usd: 2.00

context:
  file_map: false
