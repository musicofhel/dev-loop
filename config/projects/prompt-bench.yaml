# Project-specific configuration for prompt-bench
# Primary test target for TB-1 through TB-4

quality_gates:
  differential:
    enabled: true
  sanity:
    enabled: true
    commands: ["npm test", "npm run lint"]
  relevance:
    enabled: true
    model: claude-sonnet-4-6
  atdd:
    enabled: false  # no specs yet
  secrets:
    enabled: true
    allowlist: ["tests/fixtures/fake-key.pem"]
  dangerous_ops:
    enabled: true
  security:
    enabled: true
    severity_threshold: medium  # low findings don't block
  review:
    enabled: true
    block_on: critical  # only critical findings block
  cost:
    enabled: true
    ceiling_usd: 2.00

context:
  file_map: false  # Small repo, not needed
