# dev-loop full stack: OpenObserve (L5 observability) + Langfuse (L7 LLMOps)
# Usage: docker compose up -d  |  just stack-up-full

services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    ports:
      - "5080:5080"
    volumes:
      - dev-loop-oo-data:/data
    environment:
      ZO_ROOT_USER_EMAIL: admin@dev-loop.local
      ZO_ROOT_USER_PASSWORD: devloop123
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: dev-loop-langfuse-secret
      NEXTAUTH_URL: http://localhost:3001
      SALT: dev-loop-salt
      TELEMETRY_ENABLED: "false"
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  dev-loop-oo-data:
  langfuse-db-data:
