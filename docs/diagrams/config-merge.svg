<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 629.386 303.6" width="629.386" height="303.6" style="--bg:#0d1117;--fg:#e6edf3;--line:#8b949e;--accent:#58a6ff;--muted:#8b949e;--surface:#161b22;--border:#30363d;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="BUILTIN" data-to="MERGED" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="105.435,105.80000000000001 105.435,123.80000000000001 310.98799999999994,123.80000000000001 310.98799999999994,141.8" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="GLOBAL" data-to="MERGED" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="310.98799999999994,105.80000000000001 310.98799999999994,123.80000000000001 310.98799999999994,123.80000000000001 310.98799999999994,141.8" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="REPO" data-to="MERGED" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="520.246,105.80000000000001 520.246,123.80000000000001 310.98799999999994,123.80000000000001 310.98799999999994,141.8" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="MERGED" data-to="ENGINE" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="310.98799999999994,178.70000000000002 310.98799999999994,226.70000000000002" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="BUILTIN" data-label="Built-in Defaults
(hardcoded)" data-shape="rectangle">
  <rect x="40" y="52" width="130.87" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="105.435" y="78.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="105.435" dy="-3.9000000000000012">Built-in Defaults</tspan><tspan x="105.435" dy="16.900000000000002">(hardcoded)</tspan></text>
</g>
<g class="node" data-id="GLOBAL" data-label="Global Config
~/.config/dev-loop/ambient.yaml" data-shape="rectangle">
