  <text x="310.98799999999994" y="78.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="310.98799999999994" dy="-3.9000000000000012">Global Config</tspan><tspan x="310.98799999999994" dy="16.900000000000002">~/.config/dev-loop/ambient.yaml</tspan></text>
</g>
