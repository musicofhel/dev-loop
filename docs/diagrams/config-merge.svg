  <rect x="247.03499999999997" y="141.8" width="127.906" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="310.98799999999994" y="160.25" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Merged Config</text>
</g>
<g class="node" data-id="ENGINE" data-label="Check Engine" data-shape="rectangle">
  <rect x="248.8875" y="226.70000000000002" width="124.20099999999998" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="310.988" y="245.15000000000003" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Check Engine</text>
</g>
</svg>