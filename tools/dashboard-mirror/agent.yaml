spec_version: "0.1.0"
name: dashboard-mirror
version: 0.2.0
description: "Multi-agent dashboard grounding tool — captures visual/structural mirrors of OpenObserve dashboards plus alerts, traces, functions, pipelines, and supplementary objects, then runs 3-lens analysis (structure, data, UX) to produce canonical grounding documents."
author: musicofhel
license: MIT

model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-6
  constraints:
    temperature: 0.1
    max_tokens: 16384

skills:
  - collect
  - analyze
  - ground

runtime:
  max_turns: 50
  timeout: 600

tags:
  - gitagent
  - observability
  - openobserve
  - dashboard-analysis
  - grounding
  - playwright
  - multi-agent
